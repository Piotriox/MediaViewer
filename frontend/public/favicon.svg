<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aa3bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="#16171d" rx="28"/>
  
  <!-- Play button (triangle) -->
  <polygon points="45,35 45,93 85,64" fill="url(#grad)"/>
  
  <!-- Film strip effect -->
  <circle cx="100" cy="35" r="8" fill="#aa3bff" opacity="0.7"/>
  <circle cx="100" cy="64" r="8" fill="#aa3bff" opacity="0.7"/>
  <circle cx="100" cy="93" r="8" fill="#aa3bff" opacity="0.7"/>
</svg>
