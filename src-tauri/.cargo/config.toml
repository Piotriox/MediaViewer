# Windows Desktop Application Configuration
# Optimized for x86_64 Windows builds

[build]
# Use x64 MSVC toolchain for Windows
target = "x86_64-pc-windows-msvc"

# Parallel compilation for faster builds
jobs = 4

[profile.dev]
# Fast debug builds for development
opt-level = 0
debug = true
debug-assertions = true
overflow-checks = true
lto = false
panic = 'unwind'
incremental = true

[profile.release]
# Optimized release builds
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = true
codegen-units = 1
strip = true
panic = 'abort'

[profile.test]
opt-level = 1

[profile.bench]
opt-level = 3
lto = true
codegen-units = 1

[target.x86_64-pc-windows-msvc]
# Windows-specific linker settings
rustflags = ["-C", "target-feature=+crt-static"]
